    <style>
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-spinner {
            width: 56px;
            height: 56px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ff004f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loader-text {
            margin-top: 20px;
            color: #ccc;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            letter-spacing: 1px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .page-content {
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .page-content.loaded {
            opacity: 1;
        }
    </style>
</head>

    <div id="alertBox" class="alert" style="display: none;"></div>
    <script>
        // ======================================================
        //         GLOBAL: Store portfolio data for contact form
        // ======================================================
        let currentPortfolioData = null;

        // ======================================================
        //               REUSABLE DISPLAY FUNCTION
        // ======================================================
        function populateProfile(data) {
            if (!data) {
                document.body.innerHTML = "<h1 style='text-align:center;margin-top:50px;'>Portfolio not found or is incomplete.</h1>";
                return;
            }

            currentPortfolioData = data;

            // Full Name & Header Text
            const headerTextH1 = document.querySelector('.header-text h1');
            if (headerTextH1) {
                const name = data.fullName || 'User';
                const city = data.city || '';
                if (city) {
                    headerTextH1.innerHTML = `Hi, I'm <span class="fullName">${name}</span><br> from ${city}`;
                } else {
                    headerTextH1.innerHTML = `Hi, I'm <span class="fullName">${name}</span>`;
                }
            }

            // Role — use Typed.js if available
            const typerEl = document.getElementById('typer');
            if (typerEl && data.role) {
                typerEl.textContent = '';
                if (typeof Typed !== 'undefined') {
                    new Typed('#typer', {
                        strings: [data.role],
                        typeSpeed: 50,
                        showCursor: false
                    });
                } else {
                    typerEl.textContent = data.role;
                }
            }

            // Profile Photos
            const headerImg = document.querySelector('.header-text img');
            const aboutImg = document.querySelector('.about-col-1 img');
            const defaultPhoto = 'https://static.vecteezy.com/system/resources/previews/009/292/244/non_2x/default-avatar-icon-of-social-media-user-vector.jpg';
            if (headerImg) headerImg.src = data.photo || defaultPhoto;
            if (aboutImg) aboutImg.src = data.photo || defaultPhoto;

            // Resume Links
            const resumeBtn = document.querySelector('#resume-btn a');
            const contactResumeBtn = document.querySelector('#contact .contact-left a.btn2');
            if (data.resume) {
                if (resumeBtn) resumeBtn.href = data.resume;
                if (contactResumeBtn) contactResumeBtn.href = data.resume;
            } else {
                if (resumeBtn) resumeBtn.style.display = 'none';
                if (contactResumeBtn) contactResumeBtn.style.display = 'none';
            }

            // About Me Text
            const aboutP = document.querySelector('#about .about-col-2 p');
            if (aboutP) aboutP.textContent = data.aboutMe || 'No bio available.';

            // Skills
            const skillsList = document.querySelector('#skills ul');
            if (skillsList) {
                if (Array.isArray(data.skills) && data.skills.length > 0) {
                    skillsList.innerHTML = data.skills.map(skill =>
                        `<li><span>${skill.name || skill}</span><br>${skill.description || ''}</li>`
                    ).join('');
                } else {
                    skillsList.innerHTML = '<li>No skills listed yet.</li>';
                }
            }

            // Experience
            const expList = document.querySelector('#experience ul');
            if (expList) {
                if (Array.isArray(data.experience) && data.experience.length > 0) {
                    expList.innerHTML = data.experience.map(exp =>
                        `<li><span>${exp.start || ''} - ${exp.end || 'Present'}</span><br>${exp.role || ''} at ${exp.company || ''}</li>`
                    ).join('');
                } else {
                    expList.innerHTML = '<li>No experience listed yet.</li>';
                }
            }

            // Education
            const eduList = document.querySelector('#education ul');
            if (eduList) {
                if (Array.isArray(data.education) && data.education.length > 0) {
                    eduList.innerHTML = data.education.map(edu =>
                        `<li><span>${edu.year || ''}</span><br>${edu.degree || ''} at ${edu.college || ''}</li>`
                    ).join('');
                } else {
                    eduList.innerHTML = '<li>No education listed yet.</li>';
                }
            }

            // Projects (My Works)
            const workList = document.querySelector('.work-list');
            const portfolioSection = document.getElementById('portfolio');
            if (workList) {
                if (Array.isArray(data.projects) && data.projects.length > 0) {
                    workList.innerHTML = data.projects.map((project, index) => {
                        // Backend saves photos both inside project.photo and at root level projectPhoto1, 2, 3
                        const rootPhoto = data[`projectPhoto${index + 1}`];
                        const photoUrl = project.photo || rootPhoto || 'https://via.placeholder.com/300x200?text=No+Project+Image';
                        return `
                        <div class="work">
                            <img src="${photoUrl}" alt="${project.name || 'Project image'}">
                            <div class="layer">
                                <h2>${project.name || 'Project'}</h2>
                                <p>${project.description || ''}</p>
                                ${project.link ? `<a href="${project.link}" target="_blank"><i class="fas fa-external-link-alt"></i></a>` : ''}
                            </div>
                        </div>
                    `}).join('');
                } else {
                    workList.innerHTML = '<p style="color:#b1b1b1;text-align:center;">No projects added yet.</p>';
                }
            }

            // Contact Details
            const contactLeft = document.querySelector('.contact-left');
            if (contactLeft) {
                const emailP = contactLeft.querySelector('p:nth-child(2)');
                const phoneP = contactLeft.querySelector('p:nth-child(3)');

                if (emailP) {
                    const email = data.contactDetails?.contactEmail || '';
                    emailP.innerHTML = email ? `<i class="fas fa-paper-plane"></i> ${email}` : '';
                    if (!email) emailP.style.display = 'none';
                }

                if (phoneP) {
                    const phone = data.contactDetails?.phone || '';
                    phoneP.innerHTML = phone ? `<i class="fas fa-phone-square-alt"></i> +91 ${phone}` : '';
                    if (!phone) phoneP.style.display = 'none';
                }

                // Social media links
                const socialIcons = contactLeft.querySelector('.social-icons');
                if (socialIcons && data.contactDetails) {
                    const links = socialIcons.querySelectorAll('a');
                    const socialUrls = [
                        data.contactDetails.facebook,
                        data.contactDetails.twitter || '',
                        data.contactDetails.instagram,
                        data.contactDetails.linkedin
                    ];
                    links.forEach((link, i) => {
                        if (socialUrls[i]) {
                            link.href = socialUrls[i];
                            link.target = '_blank';
                        } else {
                            link.style.display = 'none';
                        }
                    });
                }
            }

            // Update page title
            if (data.fullName) {
                document.title = `${data.fullName} - Portfolio`;
            }
        }

        // Helper: hide loader & reveal page
        function showPage() {
            const overlay = document.getElementById('loadingOverlay');
            const content = document.getElementById('pageContent');
            if (overlay) overlay.classList.add('hidden');
            if (content) content.classList.add('loaded');
        }

        // ======================================================
        //             MAIN LOGIC TO LOAD PROFILE
        // ======================================================
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const portfolioId = params.get('id');


            try {
                let response;
                if (portfolioId) {
                    // Fetch the specific profile using the ID from the URL
                    response = await fetch(`${process.env.BACKEND_URL}/profile/${portfolioId}`);
                } else {
                    // No ID provided — try to load logged-in intern's own profile
                    const token = localStorage.getItem('jwtToken');
                    if (!token) {
                        showPage();
                        document.getElementById('pageContent').innerHTML = "<h2 style='color: red; font-size: 20px; font-weight: 700; text-align: center; margin-top: 50px;'>PLEASE LOG IN TO VIEW PORTFOLIO</h2>";
                        return;
                    }
                    response = await fetch(`${process.env.BACKEND_URL}/profile`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    // If 401 — user might be a recruiter, not an intern
                    if (response.status === 401) {
                        showPage();
                        document.getElementById('pageContent').innerHTML = "<h2 style='color: #ff004f; font-size: 20px; font-weight: 700; text-align: center; margin-top: 50px;'>No portfolio ID provided.<br><span style=\"font-size:14px;color:#aaa;font-weight:400;\">Please select a user's portfolio to view it.</span></h2>";
                        return;
                    }
                }

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.message || errorData.error || 'Portfolio could not be loaded.');
                }

                const profileData = await response.json();
               

                populateProfile(profileData);

                // Reveal page
                showPage();

            } catch (err) {
                console.error('Profile load error:', err);
                showPage();
                document.getElementById('pageContent').innerHTML = `<h1 style="text-align:center;margin-top:50px;color:#ff4444;">Error: ${err.message}</h1>`;
            }
        });

        // ======================================================
        //             CONTACT FORM HANDLER
        // ======================================================
        const contactForm = document.getElementById('contactForm');
        if (contactForm) {
            contactForm.addEventListener('submit', async function (e) {
                e.preventDefault();

                if (!currentPortfolioData) {
                    alert('Portfolio data not loaded yet.');
                    return;
                }

                const userId = currentPortfolioData.userId || currentPortfolioData._id;
                const formData = new FormData(this);

                try {
                    const res = await fetch(`${process.env.BACKEND_URL}/send-contact`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: userId,
                            name: formData.get('Name'),
                            email: formData.get('Email'),
                            message: formData.get('Message')
                        })
                    });

                    const data = await res.json();
                    if (res.ok) {
                        alert('Message sent successfully!');
                        this.reset();
                    } else {
                        alert(data.message || 'Failed to send message.');
                    }
                } catch (err) {
                    console.error('Contact form error:', err);
                    alert('Failed to send message. Please try again.');
                }
            });
        }

        // ======================================================
        //             TAB SWITCHING FUNCTIONALITY
        // ======================================================
        function openTab(tabName, event) {
            document.querySelectorAll('.tab-links').forEach(link =>
                link.classList.remove('active-link')
            );
            document.querySelectorAll('.tab-contents').forEach(content =>
                content.classList.remove('active-tab')
            );
            event.currentTarget.classList.add('active-link');
            document.getElementById(tabName).classList.add('active-tab');
        }
    </script>
